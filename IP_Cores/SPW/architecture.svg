<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="620" fill="#ffffff"/>
  <text x="490" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">SpaceWire IP Core (ECSS-E-ST-50-12C) — RV32I SoC v3, region 0xB000_0000</text>

  <!-- ======================= bus dmem ======================= -->
  <rect x="20" y="70" width="120" height="470" rx="8" fill="#eef3fa" stroke="#3a5f8a" stroke-width="1.5"/>
  <text x="80" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3c5f">RV32 dmem</text>
  <text x="80" y="112" text-anchor="middle" font-size="11" fill="#1f3c5f">bus</text>
  <text x="80" y="140" text-anchor="middle" font-size="10" fill="#444">sel (1 ciclo)</text>
  <text x="80" y="155" text-anchor="middle" font-size="10" fill="#444">we / addr(7:0)</text>
  <text x="80" y="170" text-anchor="middle" font-size="10" fill="#444">wdata(31:0)</text>
  <text x="80" y="185" text-anchor="middle" font-size="10" fill="#444">rdata comb.</text>
  <text x="80" y="200" text-anchor="middle" font-size="10" fill="#444">irq (nivel)</text>

  <!-- ======================= spw_mmio ======================= -->
  <rect x="180" y="60" width="330" height="500" rx="10" fill="#f7f7f7" stroke="#555" stroke-width="1.5"/>
  <text x="345" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">spw_mmio</text>

  <!-- banco de registros -->
  <rect x="200" y="100" width="130" height="270" rx="6" fill="#fff6e5" stroke="#b07c1f" stroke-width="1.3"/>
  <text x="265" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5410">Registros</text>
  <text x="265" y="140" text-anchor="middle" font-size="10" fill="#444">0x00 CTRL</text>
  <text x="265" y="155" text-anchor="middle" font-size="10" fill="#444">0x04 DIV</text>
  <text x="265" y="170" text-anchor="middle" font-size="10" fill="#444">0x08 CMD</text>
  <text x="265" y="185" text-anchor="middle" font-size="10" fill="#444">0x0C TIME</text>
  <text x="265" y="200" text-anchor="middle" font-size="10" fill="#444">0x10 STAT</text>
  <text x="265" y="215" text-anchor="middle" font-size="10" fill="#444">0x14 TXD</text>
  <text x="265" y="230" text-anchor="middle" font-size="10" fill="#444">0x18 RXD</text>
  <text x="265" y="245" text-anchor="middle" font-size="10" fill="#444">0x1C IRQEN</text>
  <text x="265" y="272" text-anchor="middle" font-size="9" fill="#7a5410">stickies b16..b24</text>
  <text x="265" y="285" text-anchor="middle" font-size="9" fill="#7a5410">(clear al escribir,</text>
  <text x="265" y="297" text-anchor="middle" font-size="9" fill="#7a5410">los sets ganan)</text>
  <text x="265" y="315" text-anchor="middle" font-size="9" fill="#7a5410">pop-on-read + VALID</text>
  <text x="265" y="330" text-anchor="middle" font-size="9" fill="#7a5410">irq = or(STAT&amp;IRQEN)</text>
  <text x="265" y="352" text-anchor="middle" font-size="9" fill="#7a5410">EN = reset sincrono</text>

  <!-- FIFO TX -->
  <rect x="360" y="110" width="130" height="80" rx="6" fill="#e8f5ec" stroke="#2e7d4f" stroke-width="1.3"/>
  <text x="425" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5334">TX FIFO</text>
  <text x="425" y="150" text-anchor="middle" font-size="10" fill="#444">spw_fifo 64 x 9</text>
  <text x="425" y="165" text-anchor="middle" font-size="10" fill="#444">FWFT + flush</text>
  <text x="425" y="180" text-anchor="middle" font-size="9" fill="#666">sticky TXOVF</text>

  <!-- FIFO RX -->
  <rect x="360" y="430" width="130" height="80" rx="6" fill="#e8f5ec" stroke="#2e7d4f" stroke-width="1.3"/>
  <text x="425" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5334">RX FIFO</text>
  <text x="425" y="470" text-anchor="middle" font-size="10" fill="#444">spw_fifo 64 x 9</text>
  <text x="425" y="485" text-anchor="middle" font-size="10" fill="#444">FWFT + flush</text>
  <text x="425" y="500" text-anchor="middle" font-size="9" fill="#666">sticky RXOVF</text>

  <!-- flechas bus <-> mmio -->
  <line x1="140" y1="180" x2="200" y2="180" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="210" x2="140" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- regs -> fifo tx (escritura TXD) -->
  <line x1="330" y1="150" x2="360" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="345" y="143" text-anchor="middle" font-size="9" fill="#555">TXD</text>
  <!-- fifo rx -> regs (RXD pop) -->
  <line x1="360" y1="470" x2="330" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="345" y="463" text-anchor="middle" font-size="9" fill="#555">RXD</text>
  <line x1="265" y1="370" x2="265" y2="470" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ======================= spw_codec ======================= -->
  <rect x="545" y="60" width="330" height="500" rx="10" fill="#f2f0fa" stroke="#4a3d80" stroke-width="1.5"/>
  <text x="710" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2260">spw_codec</text>

  <!-- spw_link -->
  <rect x="565" y="220" width="140" height="180" rx="6" fill="#efe7f7" stroke="#6a4d9e" stroke-width="1.3"/>
  <text x="635" y="242" text-anchor="middle" font-size="12" font-weight="bold" fill="#43306b">spw_link</text>
  <text x="635" y="262" text-anchor="middle" font-size="9" fill="#444">ErrorReset > ErrorWait</text>
  <text x="635" y="275" text-anchor="middle" font-size="9" fill="#444">> Ready > Started</text>
  <text x="635" y="288" text-anchor="middle" font-size="9" fill="#444">> Connecting > Run</text>
  <text x="635" y="306" text-anchor="middle" font-size="9" fill="#444">timers 6.4 / 12.8 us</text>
  <text x="635" y="324" text-anchor="middle" font-size="9" fill="#444">creditos: FCT = 8,</text>
  <text x="635" y="337" text-anchor="middle" font-size="9" fill="#444">max 56, fct_req por</text>
  <text x="635" y="350" text-anchor="middle" font-size="9" fill="#444">rx_room</text>
  <text x="635" y="370" text-anchor="middle" font-size="9" fill="#444">errores: par / esc /</text>
  <text x="635" y="383" text-anchor="middle" font-size="9" fill="#444">disc 850ns / credito</text>

  <!-- spw_tx -->
  <rect x="730" y="110" width="130" height="110" rx="6" fill="#e7eefb" stroke="#3559a3" stroke-width="1.3"/>
  <text x="795" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#23407e">spw_tx</text>
  <text x="795" y="152" text-anchor="middle" font-size="9" fill="#444">codificacion DS</text>
  <text x="795" y="165" text-anchor="middle" font-size="9" fill="#444">paridad impar</text>
  <text x="795" y="178" text-anchor="middle" font-size="9" fill="#444">TIME &gt; FCT &gt;</text>
  <text x="795" y="191" text-anchor="middle" font-size="9" fill="#444">N-Char &gt; NULL</text>
  <text x="795" y="207" text-anchor="middle" font-size="9" fill="#444">DIV ciclos/bit</text>

  <!-- spw_rx -->
  <rect x="730" y="400" width="130" height="120" rx="6" fill="#e7eefb" stroke="#3559a3" stroke-width="1.3"/>
  <text x="795" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#23407e">spw_rx</text>
  <text x="795" y="442" text-anchor="middle" font-size="9" fill="#444">sincronizador 2FF</text>
  <text x="795" y="455" text-anchor="middle" font-size="9" fill="#444">bit = D xor S</text>
  <text x="795" y="468" text-anchor="middle" font-size="9" fill="#444">caza primer NULL</text>
  <text x="795" y="481" text-anchor="middle" font-size="9" fill="#444">paridad + escape</text>
  <text x="795" y="494" text-anchor="middle" font-size="9" fill="#444">desconexion 850ns</text>
  <text x="795" y="507" text-anchor="middle" font-size="9" fill="#444">HALT hasta rearme</text>

  <!-- time latch -->
  <rect x="565" y="110" width="140" height="60" rx="6" fill="#efe7f7" stroke="#6a4d9e" stroke-width="1.1"/>
  <text x="635" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#43306b">time latch</text>
  <text x="635" y="150" text-anchor="middle" font-size="9" fill="#444">tick_in / tick_out</text>
  <text x="635" y="163" text-anchor="middle" font-size="9" fill="#444">time(7:0)</text>

  <!-- tx fifo -> spw_tx (credit gate) -->
  <line x1="490" y1="150" x2="730" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="608" y="97" text-anchor="middle" font-size="9" fill="#555"></text>
  <rect x="522" y="138" width="10" height="24" fill="#fff" stroke="#a33" stroke-width="1"/>
  <text x="527" y="132" text-anchor="middle" font-size="8" fill="#a33">gate</text>
  <text x="560" y="188" text-anchor="middle" font-size="9" fill="#a33"></text>
  <line x1="635" y1="220" x2="635" y2="170" stroke="#6a4d9e" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="705" y1="145" x2="730" y2="145" stroke="#6a4d9e" stroke-width="0" />
  <text x="612" y="196" font-size="9" fill="#a33">credit_ok</text>
  <line x1="605" y1="200" x2="527" y2="163" stroke="#a33" stroke-width="1" marker-end="url(#arr)"/>

  <!-- link -> tx control -->
  <line x1="705" y1="250" x2="795" y2="250" stroke="#6a4d9e" stroke-width="1.2"/>
  <line x1="795" y1="250" x2="795" y2="220" stroke="#6a4d9e" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="748" y="243" text-anchor="middle" font-size="8.5" fill="#6a4d9e">txen, allow_fct/nchar, fct_req</text>

  <!-- rx -> link eventos -->
  <line x1="795" y1="400" x2="795" y2="370" stroke="#6a4d9e" stroke-width="1.2"/>
  <line x1="795" y1="370" x2="705" y2="370" stroke="#6a4d9e" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="753" y="363" text-anchor="middle" font-size="8.5" fill="#6a4d9e">gotNULL/FCT, errores</text>

  <!-- spw_rx -> rx fifo -->
  <line x1="730" y1="470" x2="490" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="608" y="463" text-anchor="middle" font-size="9" fill="#555">rx_we / rx_data(8:0)</text>

  <!-- rx_room del fifo rx al link -->
  <line x1="470" y1="430" x2="470" y2="345" stroke="#2e7d4f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="470" y1="345" x2="565" y2="345" stroke="#2e7d4f" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="505" y="338" text-anchor="middle" font-size="8.5" fill="#2e7d4f">rx_room</text>

  <!-- ======================= salida DS y loopback ======================= -->
  <rect x="895" y="240" width="70" height="140" rx="6" fill="#fdeaea" stroke="#a33" stroke-width="1.3"/>
  <text x="930" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a1f1f">LOOP_INT</text>
  <text x="930" y="278" text-anchor="middle" font-size="9" fill="#444">mux</text>
  <text x="930" y="300" text-anchor="middle" font-size="9" fill="#444">CTRL[4]</text>
  <text x="930" y="330" text-anchor="middle" font-size="9" fill="#666">v1: sin pads</text>
  <text x="930" y="344" text-anchor="middle" font-size="9" fill="#666">(LVDS v1.1)</text>

  <line x1="860" y1="160" x2="930" y2="160" stroke="#a33" stroke-width="1.5"/>
  <line x1="930" y1="160" x2="930" y2="240" stroke="#a33" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="893" y="153" text-anchor="middle" font-size="9" fill="#a33">Dout, Sout</text>

  <line x1="930" y1="380" x2="930" y2="460" stroke="#a33" stroke-width="1.5"/>
  <line x1="930" y1="460" x2="860" y2="460" stroke="#a33" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="898" y="453" text-anchor="middle" font-size="9" fill="#a33">Din, Sin</text>

  <!-- pie -->
  <text x="490" y="590" text-anchor="middle" font-size="10" fill="#666">Firmas: 1a 29756ns / 1b 21226ns / 1c 362076ns / 2 89476ns / 4 68055ns — Silicio TE0950: SPW SILICON PASS 10/20/25/50 Mbit/s, WNS +2.740 ns</text>
  <text x="490" y="607" text-anchor="middle" font-size="10" fill="#666">aclk 100 MHz - DIV = ciclos por bit (10/5/4/2) - creditos FCT=8 max 56 - IRQ por nivel - VHDL-2008</text>
</svg>
