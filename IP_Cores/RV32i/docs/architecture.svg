<svg width="760" height="560" viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .lbl{fill:#1e293b;font-size:14px;font-weight:600}
      .sub{fill:#64748b;font-size:11px}
      .tag{fill:#475569;font-size:11px;font-style:italic}
      .ttl{fill:#0f172a;font-size:13px;font-weight:700}
    </style>
  </defs>

  <rect width="760" height="560" fill="#ffffff"/>

  <!-- A72 / Linux -->
  <rect x="90" y="28" width="200" height="52" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="190" y="50" text-anchor="middle" class="lbl">A72 · Linux (PS)</text>
  <text x="190" y="68" text-anchor="middle" class="sub">host app: escribe matriz, arranca core</text>

  <!-- arrow A72 -> slave -->
  <line x1="150" y1="80" x2="150" y2="128" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="158" y="108" class="tag">AXI4-Lite</text>

  <!-- SoC container -->
  <rect x="40" y="128" width="620" height="330" rx="16" fill="#fafafa" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="60" y="150" class="ttl">soc_top_master  (PL — Programmable Logic)</text>

  <!-- AXI-Lite slave -->
  <rect x="70" y="168" width="170" height="58" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.4"/>
  <text x="155" y="192" text-anchor="middle" class="lbl">AXI-Lite esclavo</text>
  <text x="155" y="210" text-anchor="middle" class="sub">control · IMEM · DDR_BASE</text>

  <!-- RISC-V core -->
  <rect x="330" y="168" width="200" height="58" rx="9" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.6"/>
  <text x="430" y="192" text-anchor="middle" class="lbl">RISC-V pipeline</text>
  <text x="430" y="210" text-anchor="middle" class="sub">RV32IM + Zicsr · 5 etapas</text>

  <!-- slave -> core -->
  <line x1="240" y1="197" x2="328" y2="197" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- core -> decoder -->
  <line x1="430" y1="226" x2="430" y2="258" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- decoder -->
  <rect x="330" y="258" width="200" height="52" rx="9" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.4"/>
  <text x="430" y="281" text-anchor="middle" class="lbl">decodificador</text>
  <text x="430" y="298" text-anchor="middle" class="sub">rutea por direccion</text>

  <!-- local RAM -->
  <rect x="90" y="360" width="180" height="58" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="180" y="384" text-anchor="middle" class="lbl">RAM local</text>
  <text x="180" y="402" text-anchor="middle" class="sub">rapida · 1 ciclo</text>

  <!-- DMA -->
  <rect x="410" y="360" width="200" height="58" rx="9" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="384" text-anchor="middle" class="lbl">motor DMA</text>
  <text x="510" y="402" text-anchor="middle" class="sub">bursts AXI4 · troceo 4KB</text>

  <!-- decoder -> local -->
  <line x1="360" y1="310" x2="220" y2="358" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <!-- decoder -> dma -->
  <line x1="470" y1="310" x2="510" y2="358" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- DMA -> master out (down out of container) -->
  <line x1="510" y1="418" x2="510" y2="490" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="518" y="452" class="tag">AXI4 maestro</text>

  <!-- IRQ -->
  <line x1="240" y1="180" x2="150" y2="180" stroke="#475569" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="60" y="250" class="tag" transform="rotate(-90 60 250)">IRQ (doorbell) ▲</text>

  <!-- DDR -->
  <rect x="410" y="490" width="200" height="48" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="510" y="519" text-anchor="middle" class="lbl">NoC ─▶ LPDDR4</text>
</svg>
