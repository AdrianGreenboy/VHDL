<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <style>
      .blk  { fill:#fffbeb; stroke:#b45309; stroke-width:1.5; rx:6; }
      .hdr  { fill:url(#amber); stroke:#92400e; stroke-width:1.5; rx:6; }
      .core { fill:url(#deep); }
      .lbl  { font-size:12px; fill:#451a03; }
      .lblw { font-size:12px; fill:#fffbeb; font-weight:bold; }
      .sub  { font-size:10px; fill:#78350f; }
      .tt   { font-size:13px; font-weight:bold; fill:#451a03; }
      .wire { stroke:#a16207; stroke-width:1.5; fill:none; }
      .wireb{ stroke:#92400e; stroke-width:2.5; fill:none; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#92400e"/>
    </marker>
  </defs>

  <text x="24" y="30" class="tt" font-size="17">PTP / IEEE 802.1AS Ordinary Clock IP — RV32IM SoC (TE0950 / Versal)</text>
  <text x="24" y="48" class="sub">1-step HW timestamping · autonomous PI servo · real peer path delay · MMIO / AXI4-Lite</text>

  <!-- SoC bus -->
  <rect x="24" y="70" width="712" height="40" class="hdr"/>
  <text x="380" y="95" text-anchor="middle" class="lblw">AXI4-Lite  (base 0x8000_0000 / 64K)  —  ptp_axil</text>

  <!-- register bank -->
  <rect x="24" y="130" width="712" height="52" class="blk"/>
  <text x="380" y="150" text-anchor="middle" class="tt">ptp_regs — MMIO register bank</text>
  <text x="380" y="168" text-anchor="middle" class="sub">CONTROL · SERVO_K · CMD · CLOCK_ID · STATUS(W1C) · NOW_SEC/NS(atomic) · MPD · OFFSET · IRQEN · level IRQ</text>

  <!-- datapath container -->
  <rect x="24" y="200" width="712" height="250" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3" rx="8"/>
  <text x="34" y="218" class="sub">ptp_mac — TSN wrapper (single 100 MHz domain, LOOP_INT)</text>

  <!-- clock + servo -->
  <rect x="40" y="230" width="200" height="70" class="blk"/>
  <text x="140" y="252" text-anchor="middle" class="tt">ptp_clock</text>
  <text x="140" y="270" text-anchor="middle" class="sub">48b.32b adjustable clock</text>
  <text x="140" y="285" text-anchor="middle" class="sub">autonomous PI servo (KP/KI)</text>

  <!-- timestamp -->
  <rect x="270" y="230" width="200" height="70" class="blk"/>
  <text x="370" y="252" text-anchor="middle" class="tt">ptp_tstamp ×2</text>
  <text x="370" y="270" text-anchor="middle" class="sub">SFD capture (TX / RX)</text>
  <text x="370" y="285" text-anchor="middle" class="sub">sticky + overrun, lat. cal.</text>

  <!-- pdelay -->
  <rect x="500" y="230" width="216" height="70" class="blk"/>
  <text x="608" y="252" text-anchor="middle" class="tt">ptp_pdelay (+ fsm)</text>
  <text x="608" y="270" text-anchor="middle" class="sub">meanPathDelay = ((t4-t1)-corr)/2</text>
  <text x="608" y="285" text-anchor="middle" class="sub">initiator + responder ping-pong</text>

  <!-- tx engine -->
  <rect x="40" y="320" width="320" height="70" class="blk"/>
  <text x="200" y="342" text-anchor="middle" class="tt">ptp_tx — unified message engine</text>
  <text x="200" y="360" text-anchor="middle" class="sub">Sync / Pdelay_Req / Pdelay_Resp from ROM</text>
  <text x="200" y="375" text-anchor="middle" class="sub">1-step override: originTS (off 34) / corrField (off 22)</text>

  <!-- rx parser -->
  <rect x="396" y="320" width="320" height="70" class="blk"/>
  <text x="556" y="342" text-anchor="middle" class="tt">ptp_rx — gPTP parser</text>
  <text x="556" y="360" text-anchor="middle" class="sub">msgType · seqId · portId · originTS · corrField</text>
  <text x="556" y="375" text-anchor="middle" class="sub">frame-coherent rx-timestamp pairing</text>

  <!-- MAC -->
  <rect x="40" y="405" width="676" height="34" class="hdr"/>
  <text x="378" y="427" text-anchor="middle" class="lblw">eth_mac 10/100 (MII)  —  SFD taps · byte-override mux · store-and-forward · LOOP_INT</text>

  <!-- loopback pin row -->
  <rect x="300" y="470" width="160" height="34" class="blk"/>
  <text x="380" y="492" text-anchor="middle" class="lbl">MII (LOOP_INT v1)</text>

  <!-- wires -->
  <path class="wireb" d="M380,110 L380,130" marker-end="url(#ar)"/>
  <path class="wireb" d="M380,182 L380,200" marker-end="url(#ar)"/>
  <path class="wire" d="M200,390 L200,405" marker-end="url(#ar)"/>
  <path class="wire" d="M556,405 L556,390" marker-end="url(#ar)"/>
  <path class="wire" d="M140,300 L140,320" marker-end="url(#ar)"/>
  <path class="wire" d="M370,300 L300,320" marker-end="url(#ar)"/>
  <path class="wire" d="M608,300 L556,320" marker-end="url(#ar)"/>
  <path class="wire" d="M378,439 L380,470" marker-end="url(#ar)"/>
  <path class="wire" d="M300,487 L120,487 L120,439" marker-end="url(#ar)"/>
  <path class="wire" d="M460,487 L640,487 L640,439" marker-end="url(#ar)"/>

  <text x="24" y="536" class="sub">Verification: 5 sim layers · bit-identical end-timestamps vs Python ISS oracle · mutation batteries · silicon signature to DDR 0x7000_0000</text>
  <text x="24" y="552" class="sub">GHDL 4.1.0 (VHDL-2008) · Vivado 2025.2.1 · PetaLinux 2025.2.1 · MIT License</text>
</svg>
