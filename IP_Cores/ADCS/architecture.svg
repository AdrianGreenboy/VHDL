<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#5a4030"/>
    </marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#c77a3a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="560" fill="#faf6f1"/>
  <text x="380" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#8a4a1d">ADCS MPC Accelerator — RV32I SoC v3 (Versal xcve2302)</text>
  <text x="380" y="50" text-anchor="middle" font-size="12" fill="#9a7a5a">Projected-gradient MPC solver · float32 fused-MAC datapath · dual AXI master to DDR</text>

  <!-- RV32 core -->
  <rect x="30" y="80" width="150" height="70" rx="6" fill="#8a4a1d"/>
  <text x="105" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#f5ede4">RV32IM core</text>
  <text x="105" y="126" text-anchor="middle" font-size="10.5" fill="#f0dcc8">writes pointers + START</text>
  <text x="105" y="140" text-anchor="middle" font-size="10.5" fill="#f0dcc8">polls DONE / doorbell</text>

  <!-- dmem bus label -->
  <text x="230" y="104" text-anchor="middle" font-size="10" fill="#9a7a5a">dmem bus</text>
  <text x="230" y="116" text-anchor="middle" font-size="10" fill="#9a7a5a">region 0xA</text>
  <line x1="180" y1="115" x2="285" y2="115" stroke="#5a4030" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ADCS IP outer box -->
  <rect x="290" y="72" width="440" height="330" rx="9" fill="none" stroke="#c77a3a" stroke-width="2.5"/>
  <text x="510" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a4a1d">ADCS accelerator IP (0xA000_0000)</text>

  <!-- register file -->
  <rect x="305" y="90" width="130" height="60" rx="6" fill="#b5652a"/>
  <text x="370" y="114" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#f5ede4">Register file</text>
  <text x="370" y="132" text-anchor="middle" font-size="10" fill="#f0dcc8">CTRL/STATUS/MODE</text>
  <text x="370" y="144" text-anchor="middle" font-size="10" fill="#f0dcc8">NDIM/STEP/UMAX/bases</text>

  <!-- sequencer -->
  <rect x="460" y="90" width="255" height="60" rx="6" fill="#a05a28"/>
  <text x="587" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#f5ede4">HW sequencer</text>
  <text x="587" y="130" text-anchor="middle" font-size="10" fill="#f0dcc8">LOAD_H → LOAD_G → solve → STORE_U → DONE</text>
  <text x="587" y="144" text-anchor="middle" font-size="10" fill="#f0dcc8">dbg tag 0xADC5</text>

  <line x1="435" y1="120" x2="455" y2="120" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- PGD engine -->
  <rect x="305" y="165" width="255" height="105" rx="6" fill="#c77a3a"/>
  <text x="432" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#f5ede4">PGD solver (mpc_engine)</text>
  <text x="432" y="205" text-anchor="middle" font-size="10.5" fill="#fbeee0">u ← clamp(u − step·(H·u + g))</text>
  <!-- 8 lanes -->
  <g>
    <rect x="315" y="215" width="52" height="44" rx="4" fill="#e0975a"/>
    <text x="341" y="233" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#5a3016">dot x8</text>
    <text x="341" y="246" text-anchor="middle" font-size="8.5" fill="#5a3016">NACC=16</text>
    <text x="341" y="256" text-anchor="middle" font-size="8.5" fill="#5a3016">interlock</text>
  </g>
  <rect x="375" y="215" width="80" height="44" rx="4" fill="#e0975a"/>
  <text x="415" y="233" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#5a3016">fp32 FMA</text>
  <text x="415" y="246" text-anchor="middle" font-size="8.5" fill="#5a3016">a·b+c, RNE+FTZ</text>
  <text x="415" y="256" text-anchor="middle" font-size="8.5" fill="#5a3016">lat 19 (AMD FPO)</text>
  <rect x="463" y="215" width="88" height="44" rx="4" fill="#e0975a"/>
  <text x="507" y="233" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#5a3016">clamp ±UMAX</text>
  <text x="507" y="246" text-anchor="middle" font-size="8.5" fill="#5a3016">Jacobi update</text>
  <text x="507" y="256" text-anchor="middle" font-size="8.5" fill="#5a3016">snapshot u_vec</text>

  <line x1="587" y1="150" x2="587" y2="200" stroke="#5a4030" stroke-width="1.8"/>
  <line x1="587" y1="200" x2="562" y2="200" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- memory banks -->
  <rect x="575" y="165" width="140" height="105" rx="6" fill="#8a5a34"/>
  <text x="645" y="186" text-anchor="middle" font-size="12" font-weight="bold" fill="#f5ede4">Memory banks</text>
  <text x="645" y="206" text-anchor="middle" font-size="10" fill="#f0dcc8">H 72×70 → 70×BRAM</text>
  <text x="645" y="222" text-anchor="middle" font-size="10" fill="#f0dcc8">(column-partitioned)</text>
  <text x="645" y="240" text-anchor="middle" font-size="10" fill="#f0dcc8">g vector · U vector</text>
  <text x="645" y="256" text-anchor="middle" font-size="10" fill="#f0dcc8">Jacobi snapshot</text>

  <line x1="560" y1="212" x2="573" y2="212" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="573" y1="230" x2="560" y2="230" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- DMA master -->
  <rect x="305" y="290" width="410" height="60" rx="6" fill="#a04828"/>
  <text x="510" y="313" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#f5ede4">axi_dma_engine — accelerator's own AXI4 master</text>
  <text x="510" y="332" text-anchor="middle" font-size="10" fill="#f0dcc8">OP_LOAD_H · OP_LOAD_G · OP_STORE_U   (AxPROT=010, AxCACHE=0011)</text>

  <line x1="432" y1="270" x2="432" y2="286" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="645" y1="270" x2="645" y2="286" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- NoC -->
  <rect x="290" y="430" width="440" height="50" rx="6" fill="#5a4030"/>
  <text x="510" y="452" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#f5ede4">AXI NoC (NUM_SI=8)</text>
  <text x="510" y="469" text-anchor="middle" font-size="10" fill="#e8d5c2">S06 = SoC burst-DMA   ·   S07 = ADCS master   →   both to C0_DDR_LOW0</text>

  <line x1="510" y1="350" x2="510" y2="426" stroke="#c77a3a" stroke-width="2.4" marker-end="url(#arrL)"/>
  <text x="524" y="392" font-size="9.5" fill="#a05a28">a_axi (S07)</text>

  <!-- SoC DMA + doorbell (left path) -->
  <rect x="30" y="290" width="150" height="60" rx="6" fill="#7a5233"/>
  <text x="105" y="313" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#f5ede4">SoC burst-DMA</text>
  <text x="105" y="331" text-anchor="middle" font-size="9.5" fill="#f0dcc8">report + doorbell</text>
  <line x1="105" y1="150" x2="105" y2="286" stroke="#5a4030" stroke-width="1.6"/>
  <text x="70" y="220" font-size="9" fill="#9a7a5a" transform="rotate(-90 70 220)">0x4 regs</text>
  <line x1="180" y1="320" x2="285" y2="440" stroke="#5a4030" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="205" y="392" font-size="9.5" fill="#7a5233">m_axi (S06)</text>

  <!-- DDR -->
  <rect x="290" y="505" width="440" height="42" rx="6" fill="#8a4a1d"/>
  <text x="510" y="524" text-anchor="middle" font-size="12" font-weight="bold" fill="#f5ede4">LPDDR4 — reserved buffer 0x7000_0000 (16 MB, rv32i_reserved)</text>
  <text x="510" y="539" text-anchor="middle" font-size="9.5" fill="#f0dcc8">H @0x0000 · g @0x2000 · U @0x8000 · report @0xC000</text>
  <line x1="510" y1="480" x2="510" y2="501" stroke="#c77a3a" stroke-width="2.4" marker-end="url(#arrL)"/>

  <!-- PS side note -->
  <rect x="30" y="430" width="230" height="75" rx="6" fill="none" stroke="#b09a84" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="145" y="450" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#8a6a4a">PS (A72, Linux)</text>
  <text x="145" y="467" text-anchor="middle" font-size="9.5" fill="#8a6a4a">preloads H/g · loads firmware</text>
  <text x="145" y="481" text-anchor="middle" font-size="9.5" fill="#8a6a4a">sets DDR_BASE · reads signature</text>
  <text x="145" y="495" text-anchor="middle" font-size="9.5" fill="#8a6a4a">/dev/mem · 0x0C4CCCD2</text>
  <line x1="145" y1="505" x2="290" y2="525" stroke="#b09a84" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <text x="380" y="556" text-anchor="middle" font-size="9" fill="#b09a84">SILICON PASS — TE0950 · WNS +2.844 ns · signature 0x0C4CCCD2 bit-identical to simulation</text>
</svg>
