<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .bg   { fill: #f6f0fb; }
      .box  { fill: #ffffff; stroke: #6b3fa0; stroke-width: 1.6; rx: 8; }
      .wrap { fill: #f0e4fa; stroke: #6b3fa0; stroke-width: 2; rx: 10; }
      .eng  { fill: #ede0fa; stroke: #6b3fa0; stroke-width: 1.4; rx: 8; }
      .mem  { fill: #e4d0f5; stroke: #52307c; stroke-width: 1.4; rx: 8; }
      .ext  { fill: #ffffff; stroke: #52307c; stroke-width: 1.6; rx: 8; }
      .t    { fill: #2b1a45; font-size: 13px; }
      .tb   { fill: #2b1a45; font-size: 13px; font-weight: 600; }
      .ts   { fill: #52307c; font-size: 11px; }
      .tw   { fill: #ffffff; font-size: 12px; font-weight: 600; }
      .lbl  { fill: #6b3fa0; font-size: 10.5px; font-style: italic; }
      .arr  { stroke: #6b3fa0; stroke-width: 1.6; fill: none; marker-end: url(#ah); }
      .arr2 { stroke: #52307c; stroke-width: 1.6; fill: none; marker-end: url(#ah2); }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b3fa0"/>
    </marker>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#52307c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="560" class="bg"/>
  <text x="30" y="38" class="tb" font-size="19">DSP IP Core — CORDIC · FIR · FFT</text>
  <text x="30" y="58" class="ts">RV32IM SoC accelerator · Q1.15 fixed-point · Block-RAM ping-pong FFT · Versal xcve2302</text>

  <!-- RV32IM core (left) -->
  <rect x="30" y="120" width="120" height="150" class="ext" rx="8"/>
  <text x="90" y="150" class="tb" text-anchor="middle">RV32IM</text>
  <text x="90" y="168" class="ts" text-anchor="middle">soft core</text>
  <text x="90" y="200" class="t" text-anchor="middle" font-size="11">MMIO master</text>
  <text x="90" y="218" class="ts" text-anchor="middle">fill · start</text>
  <text x="90" y="234" class="ts" text-anchor="middle">poll · read</text>

  <!-- bus -->
  <path d="M150,180 L205,180" class="arr"/>
  <text x="178" y="172" class="lbl" text-anchor="middle">0x9000_0000</text>

  <!-- dsp_mmio wrapper (big box) -->
  <rect x="205" y="95" width="420" height="410" class="wrap" rx="12"/>
  <text x="415" y="118" class="tb" text-anchor="middle" font-size="14">dsp_mmio  (MMIO wrapper + sequencer)</text>

  <!-- register file -->
  <rect x="225" y="135" width="170" height="120" class="box" rx="8"/>
  <text x="310" y="156" class="tb" text-anchor="middle">Register file</text>
  <text x="235" y="178" class="ts">ID · CTRL · STATUS</text>
  <text x="235" y="196" class="ts">LOG2N · FIR_LEN</text>
  <text x="235" y="214" class="ts">CORDA · CORDB</text>
  <text x="235" y="232" class="ts">RES_LO · RES_HI · DATA_LEN</text>
  <text x="235" y="250" class="lbl">control reads combinational</text>

  <!-- COEF bram -->
  <rect x="225" y="270" width="170" height="46" class="mem" rx="8"/>
  <text x="310" y="290" class="tw" text-anchor="middle">COEF[32]  (BRAM)</text>
  <text x="310" y="307" class="ts" text-anchor="middle">symmetric FIR taps · Q1.15</text>

  <!-- DATA bram -->
  <rect x="225" y="330" width="170" height="60" class="mem" rx="8"/>
  <text x="310" y="352" class="tw" text-anchor="middle">DATA[1024]  (BRAM)</text>
  <text x="310" y="369" class="ts" text-anchor="middle">complex {im[31:16], re[15:0]}</text>
  <text x="310" y="384" class="lbl" text-anchor="middle">registered read · 1-cycle wait-state</text>

  <!-- engines column -->
  <rect x="420" y="135" width="185" height="46" class="eng" rx="8"/>
  <text x="512" y="155" class="tb" text-anchor="middle">cordic_dp</text>
  <text x="512" y="172" class="ts" text-anchor="middle">rotation / vectoring · 16 iters</text>

  <rect x="420" y="192" width="185" height="46" class="eng" rx="8"/>
  <text x="512" y="212" class="tb" text-anchor="middle">fir_dp</text>
  <text x="512" y="229" class="ts" text-anchor="middle">symmetric block FIR · LEN≤64</text>

  <rect x="420" y="249" width="185" height="64" class="eng" rx="8"/>
  <text x="512" y="269" class="tb" text-anchor="middle">fft_dp</text>
  <text x="512" y="286" class="ts" text-anchor="middle">radix-2 complex FFT/IFFT</text>
  <text x="512" y="302" class="lbl" text-anchor="middle">ping-pong dual-bank SDP</text>

  <rect x="420" y="324" width="185" height="64" class="eng" rx="8"/>
  <text x="512" y="344" class="tb" text-anchor="middle">fft_unsplit_dp</text>
  <text x="512" y="361" class="ts" text-anchor="middle">real-FFT unpack</text>
  <text x="512" y="377" class="lbl" text-anchor="middle">4-stage pipeline</text>

  <!-- internal arrows: regfile -> engines -->
  <path d="M395,165 L418,158" class="arr"/>
  <path d="M395,200 L418,214" class="arr"/>
  <path d="M395,225 L418,270" class="arr"/>
  <path d="M395,240 L418,350" class="arr"/>

  <!-- DATA <-> fft engines -->
  <path d="M395,352 L418,300" class="arr2"/>
  <path d="M418,360 L395,362" class="arr2"/>

  <!-- FFT banks callout (bottom) -->
  <rect x="225" y="410" width="380" height="78" class="box" rx="8"/>
  <text x="415" y="431" class="tb" text-anchor="middle">FFT ping-pong banks (infer Block RAM)</text>
  <rect x="245" y="442" width="80" height="34" class="mem" rx="6"/>
  <text x="285" y="463" class="tw" text-anchor="middle">re_b0</text>
  <rect x="335" y="442" width="80" height="34" class="mem" rx="6"/>
  <text x="375" y="463" class="tw" text-anchor="middle">re_b1</text>
  <rect x="425" y="442" width="70" height="34" class="mem" rx="6"/>
  <text x="460" y="463" class="tw" text-anchor="middle">im_b0</text>
  <rect x="505" y="442" width="80" height="34" class="mem" rx="6"/>
  <text x="545" y="463" class="tw" text-anchor="middle">im_b1</text>

  <!-- right side: results / status -->
  <rect x="650" y="135" width="90" height="60" class="ext" rx="8"/>
  <text x="695" y="158" class="tb" text-anchor="middle">Results</text>
  <text x="695" y="176" class="ts" text-anchor="middle">RES_LO/HI</text>
  <text x="695" y="190" class="ts" text-anchor="middle">DATA out</text>
  <path d="M625,165 L648,165" class="arr"/>

  <rect x="650" y="210" width="90" height="50" class="ext" rx="8"/>
  <text x="695" y="232" class="tb" text-anchor="middle">STATUS</text>
  <text x="695" y="249" class="ts" text-anchor="middle">BUSY/DONE/ERR</text>
  <path d="M625,235 L648,235" class="arr"/>

  <!-- footer legend -->
  <rect x="30" y="512" width="16" height="12" class="mem" rx="3"/>
  <text x="52" y="522" class="t">Block RAM</text>
  <rect x="150" y="512" width="16" height="12" class="eng" rx="3"/>
  <text x="172" y="522" class="t">datapath engine</text>
  <rect x="300" y="512" width="16" height="12" class="wrap" rx="3"/>
  <text x="322" y="522" class="t">MMIO wrapper</text>
  <text x="470" y="522" class="ts">All Q1.15 · round-half-up · saturate · strict VHDL-2008</text>
</svg>
