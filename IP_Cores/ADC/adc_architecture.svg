<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- ===== ADC delta-sigma soft IP v1 - datapath + integration ===== -->
  <!-- paleta multicolor: cada etapa funcional un color distinto -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrHook" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#d97706"/>
    </marker>
    <style>
      .title { font-size: 19px; font-weight: 700; fill: #0f172a; }
      .sub   { font-size: 12px; fill: #64748b; }
      .blk   { font-size: 12.5px; font-weight: 600; }
      .sm    { font-size: 10px; }
      .lbl   { font-size: 9.5px; fill: #475569; }
      .note  { font-size: 9.5px; fill: #64748b; font-style: italic; }
      .bus   { font-size: 10px; font-weight: 600; fill: #1e293b; }
    </style>
  </defs>

  <text x="30" y="34" class="title">ADC delta-sigma soft IP v1 — datapath &amp; SoC integration</text>
  <text x="30" y="52" class="sub">2nd-order digital modulator source · sinc³ CIC decimator · FWFT sample FIFO · DMA to DDR · TE0950 / xcve2302</text>

  <!-- ================= PDM SOURCE (amber) ================= -->
  <rect x="30" y="80" width="200" height="150" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="100" class="blk" fill="#92400e" text-anchor="middle">PDM source (adc_pdmgen)</text>

  <rect x="46" y="112" width="168" height="34" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="130" y="127" class="sm" fill="#92400e" text-anchor="middle">phase accum + sine LUT</text>
  <text x="130" y="140" class="lbl" text-anchor="middle">1024×16 · TEST_FINC</text>

  <rect x="46" y="152" width="168" height="34" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="130" y="167" class="sm" fill="#92400e" text-anchor="middle">2nd-order Δ-Σ modulator</text>
  <text x="130" y="180" class="lbl" text-anchor="middle">CIFB, 1-bit quantizer</text>

  <rect x="46" y="192" width="168" height="30" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="130" y="211" class="lbl" text-anchor="middle">2-FF sync · source mux · activity timeout</text>

  <!-- hook B external input -->
  <rect x="30" y="250" width="200" height="46" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="130" y="268" class="sm" fill="#9a3412" text-anchor="middle">hook B (v2): LVDS comparator</text>
  <text x="130" y="284" class="lbl" text-anchor="middle">pdm_ext_i / pdm_fb_o — grounded in v1</text>
  <line x1="130" y1="250" x2="130" y2="223" stroke="#d97706" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrHook)"/>

  <!-- ================= CIC DECIMATOR (teal) ================= -->
  <rect x="280" y="80" width="200" height="150" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="380" y="100" class="blk" fill="#115e59" text-anchor="middle">CIC decimator (adc_cic)</text>

  <rect x="296" y="112" width="168" height="30" rx="5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="380" y="131" class="sm" fill="#115e59" text-anchor="middle">3× integrators @ PDM rate</text>

  <rect x="296" y="148" width="168" height="30" rx="5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="380" y="167" class="sm" fill="#115e59" text-anchor="middle">÷R decimate · OSR {32..256}</text>

  <rect x="296" y="184" width="168" height="30" rx="5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="380" y="203" class="sm" fill="#115e59" text-anchor="middle">3× combs (sinc³, M=1)</text>

  <text x="380" y="224" class="lbl" text-anchor="middle">26-bit acc (Hogenauer) · Q1.23 out</text>

  <!-- ================= FIFO (indigo) ================= -->
  <rect x="530" y="80" width="200" height="150" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="630" y="100" class="blk" fill="#3730a3" text-anchor="middle">sample FIFO (adc_fifo)</text>

  <rect x="546" y="112" width="168" height="42" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="630" y="129" class="sm" fill="#3730a3" text-anchor="middle">512×32 SDP Block RAM</text>
  <text x="630" y="145" class="lbl" text-anchor="middle">RAMB18 · [31:24] tag | [23:0] Q1.23</text>

  <rect x="546" y="160" width="168" height="38" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="630" y="177" class="sm" fill="#3730a3" text-anchor="middle">2-stage FWFT output</text>
  <text x="630" y="191" class="lbl" text-anchor="middle">combinational head → rdata</text>

  <text x="630" y="216" class="lbl" text-anchor="middle">depth 514 · threshold IRQ</text>

  <!-- flow arrows datapath -->
  <line x1="230" y1="155" x2="280" y2="155" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="255" y="148" class="bus" text-anchor="middle">1-bit</text>
  <line x1="480" y1="155" x2="530" y2="155" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="505" y="148" class="bus" text-anchor="middle">24-bit</text>

  <!-- ================= MMIO REGISTER BANK (rose) ================= -->
  <rect x="30" y="330" width="330" height="150" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <text x="195" y="350" class="blk" fill="#9f1239" text-anchor="middle">MMIO register bank (adc_regs) — combinational rdata</text>

  <rect x="46" y="362" width="150" height="26" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="121" y="379" class="lbl" text-anchor="middle">0x00 CTRL · 0x04 STATUS</text>
  <rect x="204" y="362" width="140" height="26" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="274" y="379" class="lbl" text-anchor="middle">0x08 TEST_FINC</text>

  <rect x="46" y="392" width="150" height="26" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="121" y="409" class="lbl" text-anchor="middle">0x0C LEVEL · 0x10 DATA</text>
  <rect x="204" y="392" width="140" height="26" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="274" y="409" class="lbl" text-anchor="middle">0x14/18/1C IRQ</text>

  <rect x="46" y="422" width="150" height="26" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="121" y="439" class="lbl" text-anchor="middle">0x20/24/28 DMA regs</text>
  <rect x="204" y="422" width="140" height="26" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="274" y="439" class="lbl" text-anchor="middle">0x44 DBG_STATE</text>

  <text x="195" y="466" class="note" text-anchor="middle">FIFO_DATA pop on read · threshold-edge IRQ (W1C)</text>

  <!-- FIFO to MMIO -->
  <line x1="630" y1="230" x2="630" y2="300" stroke="#334155" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="630" y1="300" x2="300" y2="300" stroke="#334155" stroke-width="1.4"/>
  <line x1="300" y1="300" x2="300" y2="330" stroke="#334155" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="470" y="294" class="lbl" text-anchor="middle">FIFO head / level / IRQ</text>

  <!-- ================= SoC INTEGRATION (slate) ================= -->
  <rect x="400" y="330" width="330" height="150" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="565" y="350" class="blk" fill="#334155" text-anchor="middle">RV32IM SoC v3 (mem_subsys_adc)</text>

  <rect x="416" y="362" width="145" height="40" rx="5" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="488" y="379" class="sm" fill="#334155" text-anchor="middle">RV32IM core</text>
  <text x="488" y="393" class="lbl" text-anchor="middle">firmware in IMEM</text>

  <rect x="569" y="362" width="145" height="40" rx="5" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="641" y="379" class="sm" fill="#334155" text-anchor="middle">ADC @ 0x6000_0000</text>
  <text x="641" y="393" class="lbl" text-anchor="middle">1-cycle dmem slave</text>

  <rect x="416" y="410" width="145" height="40" rx="5" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="488" y="427" class="sm" fill="#334155" text-anchor="middle">dma_burst</text>
  <text x="488" y="441" class="lbl" text-anchor="middle">4 KB split · D_CALC</text>

  <rect x="569" y="410" width="145" height="40" rx="5" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="641" y="427" class="sm" fill="#334155" text-anchor="middle">AXI-Lite ctrl</text>
  <text x="641" y="441" class="lbl" text-anchor="middle">0x8000_0000 / 64K</text>

  <text x="565" y="466" class="note" text-anchor="middle">m_axi → NoC → C0_DDR_LOW0 · doorbell IRQ to CIPS</text>

  <!-- MMIO to SoC -->
  <line x1="360" y1="405" x2="400" y2="405" stroke="#334155" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- DDR reserved (green) -->
  <rect x="250" y="502" width="260" height="42" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="520" class="sm" fill="#166534" text-anchor="middle">DDR reserved buffer @ 0x7000_0000 (16 MB, no-map)</text>
  <text x="380" y="535" class="lbl" text-anchor="middle">DMA writes 65 words · doorbell · PS verifies vs ISS oracle</text>
  <line x1="500" y1="480" x2="440" y2="502" stroke="#334155" stroke-width="1.4" marker-end="url(#arr)"/>

  <text x="730" y="554" class="note" text-anchor="end">MIT · silicon-validated · CHK=0x1B8D3FF9</text>
</svg>
