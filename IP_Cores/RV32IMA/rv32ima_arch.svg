<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="DejaVu Sans, Verdana, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#37474f"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="ao" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="760" height="560" fill="#fbfcfd"/>
  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a237e">HERCOSSNUX RV32IMA SoC</text>
  <text x="380" y="43" text-anchor="middle" font-size="11" fill="#546e7a">Soft core RISC-V que arranca Linux 6.1.14 nommu &#183; AMD Versal xcve2302 (Trenz TE0950)</text>

  <!-- ================= PS ================= -->
  <rect x="24" y="60" width="712" height="86" rx="6" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5"/>
  <text x="36" y="78" font-size="11" font-weight="bold" fill="#283593">PROCESSING SYSTEM (CIPS) &#183; Arm Cortex-A72 &#183; PetaLinux 2025.2.1</text>

  <rect x="40" y="88" width="150" height="44" rx="4" fill="#c5cae9" stroke="#3949ab"/>
  <text x="115" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">hercossnux_run</text>
  <text x="115" y="118" text-anchor="middle" font-size="8.5" fill="#3949ab">carga kernel + dtb</text>
  <text x="115" y="128" text-anchor="middle" font-size="8.5" fill="#3949ab">drena consola</text>

  <rect x="206" y="88" width="140" height="44" rx="4" fill="#c5cae9" stroke="#3949ab"/>
  <text x="276" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">/dev/mem</text>
  <text x="276" y="120" text-anchor="middle" font-size="8.5" fill="#3949ab">mmap 64 MB no-map</text>

  <rect x="362" y="88" width="170" height="44" rx="4" fill="#c5cae9" stroke="#3949ab"/>
  <text x="447" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">DDR reservada</text>
  <text x="447" y="120" text-anchor="middle" font-size="8.5" fill="#3949ab">0x7000_0000 &#183; 64 MB</text>

  <rect x="548" y="88" width="172" height="44" rx="4" fill="#c5cae9" stroke="#3949ab"/>
  <text x="634" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">Banco de control</text>
  <text x="634" y="120" text-anchor="middle" font-size="8.5" fill="#3949ab">0xA400_0000 &#183; 64 KB</text>

  <!-- ================= NoC ================= -->
  <rect x="24" y="160" width="712" height="42" rx="6" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text x="36" y="177" font-size="11" font-weight="bold" fill="#4527a0">NoC PROGRAMABLE (hard) &#183; 7 puertos esclavos &#183; S06_AXI &#8594; MC_0</text>
  <text x="36" y="193" font-size="9" fill="#5e35b1">segmento compartido DDR_MC_PORTS/DDR_LOW0 &#183; offset 0x0 &#183; rango 2 GB &#183; SmartConnect como puente AXI4-Lite &#8594; AXI4</text>

  <!-- flechas PS <-> NoC -->
  <line x1="447" y1="132" x2="447" y2="160" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="634" y1="132" x2="634" y2="160" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- ================= PL: SoC ================= -->
  <rect x="24" y="216" width="712" height="286" rx="6" fill="#f1f8e9" stroke="#33691e" stroke-width="1.8"/>
  <text x="36" y="234" font-size="11" font-weight="bold" fill="#33691e">PROGRAMMABLE LOGIC &#183; rv32ima_soc_top &#183; VHDL-2008 &#183; 20 MHz &#183; WNS +1.67 ns</text>

  <!-- banco de control esclavo -->
  <rect x="556" y="246" width="164" height="118" rx="5" fill="#fff8e1" stroke="#f9a825" stroke-width="1.4"/>
  <text x="638" y="263" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57f17">AXI4-Lite esclavo</text>
  <text x="566" y="280" font-size="8.3" fill="#795548">0x00 CTRL   en / reset</text>
  <text x="566" y="293" font-size="8.3" fill="#795548">0x04 STATUS halt/pwr</text>
  <text x="566" y="306" font-size="8.3" fill="#795548">0x08 RETIRED_LO/HI</text>
  <text x="566" y="319" font-size="8.3" fill="#795548">0x10 UART_RX  consume</text>
  <text x="566" y="332" font-size="8.3" fill="#795548">0x14 UART_LEVEL</text>
  <text x="566" y="345" font-size="8.3" fill="#795548">0x1C PC</text>
  <text x="566" y="358" font-size="8.3" fill="#795548">FIFO 4 K &#183; 1 BRAM</text>

  <!-- core -->
  <rect x="40" y="246" width="242" height="168" rx="5" fill="#dcedc8" stroke="#558b2f" stroke-width="1.6"/>
  <text x="161" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#33691e">rv32ima_core</text>
  <text x="161" y="277" text-anchor="middle" font-size="8.5" fill="#558b2f">multiciclo &#183; 606 lineas</text>

  <rect x="52" y="286" width="104" height="30" rx="3" fill="#f1f8e9" stroke="#7cb342"/>
  <text x="104" y="299" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#33691e">RV32I base</text>
  <text x="104" y="310" text-anchor="middle" font-size="7.5" fill="#558b2f">37 instrucciones</text>

  <rect x="166" y="286" width="104" height="30" rx="3" fill="#f1f8e9" stroke="#7cb342"/>
  <text x="218" y="299" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#33691e">ext. M</text>
  <text x="218" y="310" text-anchor="middle" font-size="7.5" fill="#558b2f">mul / div &#183; 11 DSP58</text>

  <rect x="52" y="322" width="104" height="30" rx="3" fill="#f1f8e9" stroke="#7cb342"/>
  <text x="104" y="335" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#33691e">ext. A</text>
  <text x="104" y="346" text-anchor="middle" font-size="7.5" fill="#558b2f">lr/sc &#183; 9 AMO</text>

  <rect x="166" y="322" width="104" height="30" rx="3" fill="#f1f8e9" stroke="#7cb342"/>
  <text x="218" y="335" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#33691e">Zicsr + traps</text>
  <text x="218" y="346" text-anchor="middle" font-size="7.5" fill="#558b2f">M / U &#183; mret</text>

  <rect x="52" y="358" width="218" height="44" rx="3" fill="#f9fbe7" stroke="#9ccc65"/>
  <text x="161" y="373" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#33691e">S_FETCH &#8594; S_EXEC &#8594; S_MEM &#8594; S_WB</text>
  <text x="161" y="386" text-anchor="middle" font-size="7.5" fill="#558b2f">congelable por core_clk_en: el adaptador para el core</text>
  <text x="161" y="396" text-anchor="middle" font-size="7.5" fill="#558b2f">mientras espera al bus &#183; retiro exacto por instruccion</text>

  <!-- adaptador -->
  <rect x="298" y="246" width="152" height="168" rx="5" fill="#e0f7fa" stroke="#00838f" stroke-width="1.6"/>
  <text x="374" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">rv32_mem_adapter</text>
  <text x="374" y="277" text-anchor="middle" font-size="8.5" fill="#00838f">arbitro core &#8596; bus</text>

  <rect x="308" y="288" width="132" height="26" rx="3" fill="#f1fdfe" stroke="#4dd0e1"/>
  <text x="374" y="298" text-anchor="middle" font-size="8" font-weight="bold" fill="#006064">FETCH_UNIT</text>
  <text x="374" y="308" text-anchor="middle" font-size="7.5" fill="#00838f">AR &#8594; R</text>

  <rect x="308" y="318" width="132" height="26" rx="3" fill="#f1fdfe" stroke="#4dd0e1"/>
  <text x="374" y="328" text-anchor="middle" font-size="8" font-weight="bold" fill="#006064">DATA_UNIT</text>
  <text x="374" y="338" text-anchor="middle" font-size="7.5" fill="#00838f">AR/R &#183; AW/W/B &#183; MMIO</text>

  <rect x="308" y="348" width="132" height="54" rx="3" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.2"/>
  <text x="374" y="361" text-anchor="middle" font-size="8" font-weight="bold" fill="#e65100">dominio del BUS</text>
  <text x="374" y="373" text-anchor="middle" font-size="7.3" fill="#ef6c00">rstn = aresetn, nunca el reset</text>
  <text x="374" y="383" text-anchor="middle" font-size="7.3" fill="#ef6c00">del core: las transacciones en</text>
  <text x="374" y="393" text-anchor="middle" font-size="7.3" fill="#ef6c00">vuelo terminan siempre</text>

  <!-- traduccion -->
  <rect x="466" y="246" width="74" height="168" rx="5" fill="#fce4ec" stroke="#ad1457" stroke-width="1.4"/>
  <text x="503" y="266" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#880e4f">xlate</text>
  <text x="503" y="292" text-anchor="middle" font-size="8" fill="#ad1457">vista core</text>
  <text x="503" y="304" text-anchor="middle" font-size="8" font-weight="bold" fill="#880e4f">0x8000_0000</text>
  <text x="503" y="322" text-anchor="middle" font-size="11" fill="#ad1457">&#8595;</text>
  <text x="503" y="340" text-anchor="middle" font-size="8" fill="#ad1457">fisica</text>
  <text x="503" y="352" text-anchor="middle" font-size="8" font-weight="bold" fill="#880e4f">0x7000_0000</text>
  <text x="503" y="378" text-anchor="middle" font-size="7.5" fill="#ad1457">fetch Y dato</text>

  <!-- MMIO -->
  <rect x="40" y="428" width="410" height="62" rx="5" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="50" y="445" font-size="10" font-weight="bold" fill="#e65100">MMIO del invitado (rv32_mmio_bus)</text>

  <rect x="52" y="452" width="120" height="30" rx="3" fill="#ffe0b2" stroke="#fb8c00"/>
  <text x="112" y="464" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#e65100">UART 16550</text>
  <text x="112" y="475" text-anchor="middle" font-size="7.5" fill="#ef6c00">0x1000_0000</text>

  <rect x="180" y="452" width="120" height="30" rx="3" fill="#ffe0b2" stroke="#fb8c00"/>
  <text x="240" y="464" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#e65100">CLINT</text>
  <text x="240" y="475" text-anchor="middle" font-size="7.5" fill="#ef6c00">0x1100_0000 &#183; 1 MHz</text>

  <rect x="308" y="452" width="130" height="30" rx="3" fill="#ffe0b2" stroke="#fb8c00"/>
  <text x="373" y="464" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#e65100">SYSCON</text>
  <text x="373" y="475" text-anchor="middle" font-size="7.5" fill="#ef6c00">0x1100_0000 poweroff</text>

  <!-- conexiones internas -->
  <line x1="282" y1="330" x2="298" y2="330" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#ag)"/>
  <line x1="298" y1="342" x2="282" y2="342" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#ag)"/>
  <text x="290" y="322" text-anchor="middle" font-size="7" fill="#2e7d32">req</text>

  <line x1="450" y1="330" x2="466" y2="330" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="540" y1="290" x2="556" y2="290" stroke="#37474f" stroke-width="1.4"/>
  <line x1="374" y1="414" x2="374" y2="428" stroke="#e65100" stroke-width="1.6" marker-end="url(#ao)"/>

  <!-- salida al NoC -->
  <line x1="503" y1="246" x2="503" y2="202" stroke="#37474f" stroke-width="2" marker-end="url(#a)"/>
  <text x="512" y="226" font-size="8" fill="#37474f">M_AXI 32 b</text>
  <line x1="638" y1="246" x2="638" y2="202" stroke="#37474f" stroke-width="2"/>
  <text x="648" y="226" font-size="8" fill="#37474f">S_AXI</text>

  <!-- ================= verificacion ================= -->
  <rect x="24" y="512" width="712" height="36" rx="5" fill="#eceff1" stroke="#607d8b" stroke-width="1.3"/>
  <text x="36" y="527" font-size="9.5" font-weight="bold" fill="#37474f">VERIFICACION</text>
  <text x="120" y="527" font-size="8.5" fill="#455a64">L1 unidades &#183; L2 integracion MMIO &#183; L3 latencias de bus 0/3/7/12 &#183; L4 lockstep contra ISS Python &#183; L5 silicio</text>
  <text x="36" y="541" font-size="8.5" fill="#455a64">firmas bit-identicas &#183; mutaciones que deben fallar &#183; 400 k instrucciones del kernel real core == ISS &#183; ISS == mini-rv32ima en 4 M pasos</text>
</svg>
