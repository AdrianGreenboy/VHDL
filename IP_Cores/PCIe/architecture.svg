<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="700" fill="#ffffff"/>
  <text x="540" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">PTP / IEEE 802.1AS IP Core — RV32I SoC v3, region 0x6000_0000</text>

  <!-- ======================= cadena de bus ======================= -->
  <rect x="20" y="70" width="130" height="250" rx="8" fill="#eef3fa" stroke="#3a5f8a" stroke-width="1.5"/>
  <text x="85" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3c5f">RV32 dmem</text>
  <text x="85" y="112" text-anchor="middle" font-size="11" fill="#1f3c5f">bus</text>
  <text x="85" y="140" text-anchor="middle" font-size="10" fill="#444">decode is_ptp:</text>
  <text x="85" y="155" text-anchor="middle" font-size="10" fill="#444">addr[31:28]=0110</text>
  <text x="85" y="178" text-anchor="middle" font-size="10" fill="#444">req / we / wstrb</text>
  <text x="85" y="193" text-anchor="middle" font-size="10" fill="#444">addr(15:0) / wdata</text>
  <text x="85" y="216" text-anchor="middle" font-size="10" fill="#444">stall hasta ready</text>

  <rect x="20" y="340" width="130" height="200" rx="8" fill="#eef3fa" stroke="#3a5f8a" stroke-width="1.5"/>
  <text x="85" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3c5f">ptp_axil_master</text>
  <text x="85" y="390" text-anchor="middle" font-size="10" fill="#444">IDLE / WR / BRESP</text>
  <text x="85" y="405" text-anchor="middle" font-size="10" fill="#444">AR / RDATA</text>
  <text x="85" y="432" text-anchor="middle" font-size="10" fill="#a33">ready SOLO con</text>
  <text x="85" y="447" text-anchor="middle" font-size="10" fill="#a33">rvalid (leccion 1:</text>
  <text x="85" y="462" text-anchor="middle" font-size="10" fill="#a33">sin corrimiento de</text>
  <text x="85" y="477" text-anchor="middle" font-size="10" fill="#a33">una transaccion)</text>
  <text x="85" y="510" text-anchor="middle" font-size="10" fill="#444">AXI4-Lite maestro</text>
  <line x1="85" y1="320" x2="85" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="20" y="565" width="130" height="110" rx="8" fill="#eef3fa" stroke="#3a5f8a" stroke-width="1.5"/>
  <text x="85" y="590" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3c5f">ptp_axil</text>
  <text x="85" y="610" text-anchor="middle" font-size="10" fill="#444">esclavo AXI4-Lite</text>
  <text x="85" y="625" text-anchor="middle" font-size="10" fill="#444">rst = not aresetn</text>
  <text x="85" y="645" text-anchor="middle" font-size="10" fill="#444">sel/we/addr(7:2)</text>
  <text x="85" y="660" text-anchor="middle" font-size="10" fill="#444">rdata combinacional</text>
  <line x1="85" y1="540" x2="85" y2="565" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="620" x2="200" y2="620" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ======================= ptp_top ======================= -->
  <rect x="200" y="60" width="860" height="620" rx="10" fill="#f7f7f7" stroke="#555" stroke-width="1.5"/>
  <text x="630" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">ptp_top</text>

  <!-- banco de registros -->
  <rect x="215" y="100" width="180" height="380" rx="6" fill="#fff6e5" stroke="#b07c1f" stroke-width="1.3"/>
  <text x="305" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5410">ptp_regs</text>
  <text x="305" y="140" text-anchor="middle" font-size="10" fill="#444">0x00 CONTROL</text>
  <text x="305" y="155" text-anchor="middle" font-size="10" fill="#444">0x04 SERVO_K  0x08 LAT</text>
  <text x="305" y="170" text-anchor="middle" font-size="10" fill="#444">0x0C CMD (en cola)</text>
  <text x="305" y="185" text-anchor="middle" font-size="10" fill="#444">0x10/14 CLKID</text>
  <text x="305" y="200" text-anchor="middle" font-size="10" fill="#444">0x18 PORT  0x1C/20 SMAC</text>
  <text x="305" y="215" text-anchor="middle" font-size="10" fill="#444">0x24 STATUS (W1C)</text>
  <text x="305" y="230" text-anchor="middle" font-size="10" fill="#444">0x28/2C NOW (snapshot)</text>
  <text x="305" y="245" text-anchor="middle" font-size="10" fill="#444">0x30/34 MPD  0x38 OFFSET</text>
  <text x="305" y="260" text-anchor="middle" font-size="10" fill="#444">0x3C RATE  0x40 IRQEN</text>
  <line x1="230" y1="275" x2="380" y2="275" stroke="#b07c1f" stroke-width="0.8"/>
  <text x="305" y="293" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a5410">sondas de silicio</text>
  <text x="305" y="310" text-anchor="middle" font-size="10" fill="#444">0x44 DBG_STATE</text>
  <text x="305" y="325" text-anchor="middle" font-size="10" fill="#444">0x48/4C DA descartado</text>
  <text x="305" y="340" text-anchor="middle" font-size="10" fill="#444">(tag 0xA5D)</text>
  <text x="305" y="355" text-anchor="middle" font-size="10" fill="#444">0x50 nivel | len drop</text>
  <text x="305" y="370" text-anchor="middle" font-size="10" fill="#444">0x54 wptr | rptr</text>
  <text x="305" y="385" text-anchor="middle" font-size="10" fill="#444">0x58 bytes 0/14/35</text>
  <text x="305" y="400" text-anchor="middle" font-size="10" fill="#444">(tag 0xB1)</text>
  <text x="305" y="425" text-anchor="middle" font-size="9.5" fill="#a33">cazaron 3 bugs de</text>
  <text x="305" y="439" text-anchor="middle" font-size="9.5" fill="#a33">silicio invisibles</text>
  <text x="305" y="453" text-anchor="middle" font-size="9.5" fill="#a33">en simulacion</text>

  <!-- reloj -->
  <rect x="430" y="100" width="290" height="90" rx="6" fill="#e9f5ec" stroke="#2e7d46" stroke-width="1.3"/>
  <text x="575" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5a30">ptp_clock + servo PI</text>
  <text x="575" y="140" text-anchor="middle" font-size="10" fill="#444">sec 48b : ns 32b, INC 10 ns @ 100 MHz</text>
  <text x="575" y="155" text-anchor="middle" font-size="10" fill="#444">acumulador de fase sub-ns</text>
  <text x="575" y="170" text-anchor="middle" font-size="10" fill="#444">salto atomico + rate_adj (esclavo)</text>

  <!-- tstamp -->
  <rect x="750" y="100" width="290" height="90" rx="6" fill="#e9f5ec" stroke="#2e7d46" stroke-width="1.3"/>
  <text x="895" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5a30">ptp_tstamp</text>
  <text x="895" y="140" text-anchor="middle" font-size="10" fill="#444">captura t1..t4 en el pulso SFD</text>
  <text x="895" y="155" text-anchor="middle" font-size="10" fill="#444">(TX y RX), exactitud de hardware</text>

  <!-- orquestador -->
  <rect x="430" y="215" width="290" height="105" rx="6" fill="#e9f5ec" stroke="#2e7d46" stroke-width="1.3"/>
  <text x="575" y="235" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5a30">ptp_pdelay_fsm + ptp_pdelay</text>
  <text x="575" y="255" text-anchor="middle" font-size="10" fill="#444">iniciador: I_SEND_REQ .. I_CALC</text>
  <text x="575" y="270" text-anchor="middle" font-size="10" fill="#444">respondedor: R_SEND_RESP ..</text>
  <text x="575" y="290" text-anchor="middle" font-size="10" fill="#444">mpd = ((t4-t1)-(t3-t2)) / 2</text>

  <!-- tx -->
  <rect x="750" y="215" width="290" height="130" rx="6" fill="#e9f5ec" stroke="#2e7d46" stroke-width="1.3"/>
  <text x="895" y="235" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5a30">ptp_tx — motor de trama</text>
  <text x="895" y="255" text-anchor="middle" font-size="10" fill="#a33">SHIFT REGISTER 544b: plantilla literal</text>
  <text x="895" y="270" text-anchor="middle" font-size="10" fill="#a33">+ parches con slices ESTATICOS</text>
  <text x="895" y="285" text-anchor="middle" font-size="10" fill="#a33">(leccion 2: sin lookup indexado)</text>
  <text x="895" y="305" text-anchor="middle" font-size="10" fill="#444">Sync 58 B / Pdelay 68 B</text>
  <text x="895" y="320" text-anchor="middle" font-size="10" fill="#444">override 1-step: originTS / corrField</text>

  <!-- rx parser -->
  <rect x="430" y="345" width="290" height="90" rx="6" fill="#e9f5ec" stroke="#2e7d46" stroke-width="1.3"/>
  <text x="575" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5a30">ptp_rx — parser gPTP</text>
  <text x="575" y="385" text-anchor="middle" font-size="10" fill="#444">mvalid / mtype / seqid / spid + ack</text>
  <text x="575" y="400" text-anchor="middle" font-size="10" fill="#444">-> lazo Sync (maestro/esclavo)</text>
  <text x="575" y="415" text-anchor="middle" font-size="10" fill="#444">-> orquestador peer-delay</text>

  <!-- fifo + gate -->
  <rect x="750" y="370" width="290" height="80" rx="6" fill="#e9f5ec" stroke="#2e7d46" stroke-width="1.3"/>
  <text x="895" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5a30">spw_fifo 2048x9 + gate S&amp;F</text>
  <text x="895" y="410" text-anchor="middle" font-size="10" fill="#444">FWFT, bit 8 = tlast; frame_ready abre</text>
  <text x="895" y="425" text-anchor="middle" font-size="10" fill="#444">el MAC solo con la trama completa</text>
  <line x1="895" y1="345" x2="895" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- eth_mac -->
  <rect x="430" y="470" width="610" height="150" rx="6" fill="#eef3fa" stroke="#3a5f8a" stroke-width="1.3"/>
  <text x="735" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f3c5f">eth_mac — MII 4 bits (mii_ce @ 25 MHz)</text>
  <rect x="450" y="505" width="270" height="55" rx="5" fill="#ffffff" stroke="#3a5f8a" stroke-width="1"/>
  <text x="585" y="525" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f3c5f">eth_tx_mii</text>
  <text x="585" y="542" text-anchor="middle" font-size="10" fill="#444">preambulo+SFD, pad 60, FCS, override</text>
  <rect x="750" y="505" width="270" height="55" rx="5" fill="#ffffff" stroke="#3a5f8a" stroke-width="1"/>
  <text x="885" y="525" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f3c5f">eth_rx_mii</text>
  <text x="885" y="542" text-anchor="middle" font-size="10" fill="#444">CRC32 + filtro DA gPTP (drop tras CRC)</text>
  <path d="M 585 560 L 585 580 L 885 580 L 885 560" stroke="#a33" stroke-width="1.8" fill="none" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="735" y="575" text-anchor="middle" font-size="10" font-weight="bold" fill="#a33">LOOP_INT (CONTROL.loopback=1)</text>
  <text x="735" y="605" text-anchor="middle" font-size="10" fill="#444">eventos fin de trama: ev_ok / ev_crc / ev_runt / ev_drop</text>
  <line x1="895" y1="450" x2="895" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="575" y1="470" x2="575" y2="435" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- pads -->
  <rect x="580" y="640" width="310" height="34" rx="6" fill="#ffffff" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="735" y="662" text-anchor="middle" font-size="11" fill="#666">pads MII (PHY externo) — v1.1, loopback=0</text>
  <line x1="735" y1="620" x2="735" y2="640" stroke="#888" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- flechas internas regs -->
  <line x1="395" y1="145" x2="430" y2="145" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="395" y1="265" x2="430" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="265" x2="750" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="145" x2="750" y2="145" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
