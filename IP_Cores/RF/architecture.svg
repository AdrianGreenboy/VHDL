<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowlight" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ===================== title ===================== -->
  <text x="380" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">RF Digital Front-End (DDC / DUC)</text>
  <text x="380" y="50" text-anchor="middle" font-size="12.5" fill="#64748b">RV32IM SoC v3 · Trenz TE0950 · AMD Versal xcve2302 · signature 0xB74940EB</text>

  <!-- ===================== SoC control (slate) ===================== -->
  <rect x="30" y="80" width="180" height="150" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.6"/>
  <text x="120" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">RV32IM SoC</text>
  <rect x="48" y="114" width="144" height="30" rx="5" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <text x="120" y="133" text-anchor="middle" font-size="11.5" fill="#334155">cpu_pipeline (RV32)</text>
  <rect x="48" y="150" width="144" height="28" rx="5" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <text x="120" y="168" text-anchor="middle" font-size="11" fill="#334155">MMIO 0x6000_0000</text>
  <rect x="48" y="184" width="144" height="30" rx="5" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <text x="120" y="203" text-anchor="middle" font-size="11" fill="#334155">AXI-Lite slave 0x8000_0000</text>

  <!-- ===================== RX datapath band ===================== -->
  <text x="490" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#0f766e" letter-spacing="0.5">RECEIVE  ·  DDC</text>

  <!-- Tone generator (amber) -->
  <rect x="250" y="110" width="92" height="60" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="296" y="134" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">Tone gen</text>
  <text x="296" y="150" text-anchor="middle" font-size="10" fill="#b45309">2nd NCO</text>
  <text x="296" y="163" text-anchor="middle" font-size="9.5" fill="#b45309">TONE_FTW</text>

  <!-- NCO (amber) -->
  <rect x="250" y="185" width="92" height="60" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="296" y="209" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">NCO</text>
  <text x="296" y="224" text-anchor="middle" font-size="9.5" fill="#b45309">32-bit phase</text>
  <text x="296" y="236" text-anchor="middle" font-size="9.5" fill="#b45309">sin/cos LUT</text>

  <!-- Mixer (violet) -->
  <rect x="370" y="148" width="88" height="60" rx="9" fill="#ede9fe" stroke="#6b4fa0" stroke-width="1.6"/>
  <text x="414" y="172" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5b21b6">Mixer</text>
  <text x="414" y="187" text-anchor="middle" font-size="9.5" fill="#6d28d9">I·cos − Q·sin</text>
  <text x="414" y="199" text-anchor="middle" font-size="9.5" fill="#6d28d9">complex Q1.15</text>

  <!-- CIC decimate (teal) -->
  <rect x="486" y="148" width="86" height="60" rx="9" fill="#ccfbf1" stroke="#0f766e" stroke-width="1.6"/>
  <text x="529" y="169" text-anchor="middle" font-size="11.5" font-weight="700" fill="#115e59">CIC ↓</text>
  <text x="529" y="184" text-anchor="middle" font-size="9.5" fill="#0f766e">sinc³ decim.</text>
  <text x="529" y="196" text-anchor="middle" font-size="9.5" fill="#0f766e">R∈{4,8,16,32}</text>

  <!-- FIR (teal, highlighted pipeline) -->
  <rect x="600" y="148" width="130" height="60" rx="9" fill="#ccfbf1" stroke="#0f766e" stroke-width="2.2"/>
  <text x="665" y="167" text-anchor="middle" font-size="11.5" font-weight="700" fill="#115e59">FIR 16-tap</text>
  <text x="665" y="182" text-anchor="middle" font-size="9.5" fill="#0f766e">5-stage pipeline</text>
  <text x="665" y="194" text-anchor="middle" font-size="9.5" fill="#0f766e">→ DSP58</text>

  <!-- AGC (pink) -->
  <rect x="600" y="238" width="130" height="56" rx="9" fill="#fce7f3" stroke="#be185d" stroke-width="1.6"/>
  <text x="665" y="261" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9d174d">AGC + RSSI</text>
  <text x="665" y="277" text-anchor="middle" font-size="9.5" fill="#be185d">gain · signal strength</text>

  <!-- RX FIFO (indigo) -->
  <rect x="486" y="238" width="86" height="56" rx="9" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.6"/>
  <text x="529" y="261" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3730a3">RX FIFO</text>
  <text x="529" y="277" text-anchor="middle" font-size="9.5" fill="#4338ca">I/Q word</text>

  <!-- ===================== TX datapath (DUC) ===================== -->
  <text x="414" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#0f766e" letter-spacing="0.5">TRANSMIT  ·  DUC</text>
  <!-- TX FIFO (indigo) -->
  <rect x="250" y="344" width="92" height="52" rx="9" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.6"/>
  <text x="296" y="366" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3730a3">TX FIFO</text>
  <text x="296" y="381" text-anchor="middle" font-size="9.5" fill="#4338ca">I/Q word</text>
  <!-- CIC interpolate (teal) -->
  <rect x="370" y="344" width="88" height="52" rx="9" fill="#ccfbf1" stroke="#0f766e" stroke-width="1.6"/>
  <text x="414" y="366" text-anchor="middle" font-size="11.5" font-weight="700" fill="#115e59">CIC ↑</text>
  <text x="414" y="381" text-anchor="middle" font-size="9.5" fill="#0f766e">sinc³ interp.</text>
  <!-- Up-mixer (violet) -->
  <rect x="486" y="344" width="86" height="52" rx="9" fill="#ede9fe" stroke="#6b4fa0" stroke-width="1.6"/>
  <text x="529" y="366" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5b21b6">Up-mixer</text>
  <text x="529" y="381" text-anchor="middle" font-size="9.5" fill="#6d28d9">Q·cos + I·sin</text>

  <!-- ===================== NoC + masters (slate) ===================== -->
  <rect x="30" y="430" width="700" height="100" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.6"/>
  <text x="55" y="452" font-size="12" font-weight="700" fill="#334155">AXI4 NoC (NUM_SI=8)</text>

  <!-- RF master (slate) -->
  <rect x="250" y="462" width="150" height="50" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1.6"/>
  <text x="325" y="483" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">RF master (rf_axi)</text>
  <text x="325" y="499" text-anchor="middle" font-size="9.5" fill="#475569">RX FIFO → DDR · S07</text>

  <!-- Family DMA (slate) -->
  <rect x="60" y="462" width="150" height="50" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1.6"/>
  <text x="135" y="483" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">family DMA</text>
  <text x="135" y="499" text-anchor="middle" font-size="9.5" fill="#475569">report / doorbell · S06</text>

  <!-- DDR (indigo) -->
  <rect x="560" y="462" width="150" height="50" rx="8" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.6"/>
  <text x="635" y="483" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3730a3">DDR 0x7000_0000</text>
  <text x="635" y="499" text-anchor="middle" font-size="9.5" fill="#4338ca">reserved 16 MB (no-map)</text>

  <!-- ===================== flow arrows ===================== -->
  <!-- tone/NCO into mixer -->
  <path d="M342,140 L366,168" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M342,212 L366,190" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- mixer -> CIC -> FIR -->
  <path d="M458,178 L482,178" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M572,178 L596,178" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- FIR -> AGC -->
  <path d="M665,208 L665,234" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- AGC -> RX FIFO -->
  <path d="M600,266 L574,266" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- RX FIFO -> RF master (routed around the TX band) -->
  <path d="M529,294 L529,420 Q529,430 519,430 L335,430 Q325,430 325,440 L325,458" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- RF master -> DDR -->
  <path d="M400,487 L556,487" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- TX flow -->
  <path d="M342,370 L366,370" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrowlight)"/>
  <path d="M458,370 L482,370" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrowlight)"/>

  <!-- SoC control (dashed) into the datapath and buses -->
  <path d="M210,150 L246,140" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowlight)"/>
  <path d="M210,165 L246,210" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowlight)"/>
  <path d="M135,214 L135,458" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowlight)"/>

  <!-- ===================== legend ===================== -->
  <g font-size="9.5" fill="#475569">
    <rect x="30" y="540" width="11" height="11" rx="2" fill="#fef3c7" stroke="#d97706"/>
    <text x="46" y="549">NCO / tone</text>
    <rect x="122" y="540" width="11" height="11" rx="2" fill="#ede9fe" stroke="#6b4fa0"/>
    <text x="138" y="549">mixer</text>
    <rect x="192" y="540" width="11" height="11" rx="2" fill="#ccfbf1" stroke="#0f766e"/>
    <text x="208" y="549">CIC / FIR</text>
    <rect x="278" y="540" width="11" height="11" rx="2" fill="#fce7f3" stroke="#be185d"/>
    <text x="294" y="549">AGC</text>
    <rect x="336" y="540" width="11" height="11" rx="2" fill="#e0e7ff" stroke="#4338ca"/>
    <text x="352" y="549">FIFO / DDR</text>
    <rect x="426" y="540" width="11" height="11" rx="2" fill="#e2e8f0" stroke="#475569"/>
    <text x="442" y="549">SoC / masters</text>
    <line x1="536" y1="546" x2="560" y2="546" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <text x="566" y="549">control</text>
  </g>
</svg>
